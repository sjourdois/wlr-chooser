# Isolated headless sway used to produce reproducible wlr-utils screenshots.
#
# Launched by tools/screenshots/lib.sh with WLR_BACKENDS=headless on a PRIVATE
# WAYLAND_DISPLAY and SWAYSOCK. The headless backend renders to in-memory
# virtual outputs and never takes DRM master, so this can run alongside a live
# session without touching the real screens.

default_border none
focus_follows_mouse no
xwayland disable

# Single virtual output. Resolution can be overridden at runtime via swaymsg.
output HEADLESS-1 resolution 1920x1080 position 0,0 background #1e2030 solid_color

# A bit of breathing room so tiled windows read well in captures.
gaps inner 14
gaps outer 14

# The live mirror (wlr-peek mirror) is a floating picture-in-picture window.
for_window [app_id="wlr-peek-mirror"] floating enable, sticky enable
for_window [app_id="wlr-peek-mirror"] move position 1640 180

# Publish our private WAYLAND_DISPLAY so the driver can target THIS instance
# (sway names its socket with add_socket_auto, ignoring the WAYLAND_DISPLAY env).
exec_always sh -c 'printf %s "$WAYLAND_DISPLAY" > "$XDG_RUNTIME_DIR/wlr-shots-display"'
