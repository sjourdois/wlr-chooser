[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Linux/wlroots only).
targets = ["x86_64-unknown-linux-gnu"]

# System libraries needed to build on the CI runners (EGL/GL are loaded at
# runtime via dlopen, so they are not build dependencies).
[dist.dependencies.apt]
libwayland-dev = '*'
libxkbcommon-dev = '*'
libfontconfig-dev = '*'
