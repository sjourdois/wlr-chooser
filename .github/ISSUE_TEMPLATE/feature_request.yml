name: Feature request
description: Suggest an idea or improvement for one of the tools.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describing the problem you're trying to solve (not just
        the solution) helps a lot in finding the right fit.

  - type: dropdown
    id: tool
    attributes:
      label: Which tool?
      multiple: true
      options:
        - wlr-chooser
        - wlr-switcher
        - wlr-peek
        - wlr-shot
        - wlr-draw
        - wlr-capture (the shared engine)
        - New tool / whole suite
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or frustration behind the request.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
